spring:
  datasource:
    url: jdbc:h2:mem:zaritalk;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console: #h2-console
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    root: info
    kr:
      co:
        szs:
          task: debug
    org:
      hibernate:
        type: off
        SQL: off
      springframework:
        boot:
          autoconfigure: error

springdoc:
  api-docs:
    enabled: true